services:
  postgres:
    image: postgres:16-alpine
    container_name: isyshell-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-isy_shell}
      POSTGRES_USER: ${POSTGRES_USER:-isy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-isy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-isy} -d ${POSTGRES_DB:-isy_shell}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: isyshell-api
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://isy:isy@postgres:5432/isy_shell}
      ISY_API_TOKEN: ${ISY_API_TOKEN:-change-me-token}
      SCRIPT_BASE_PATH: ${SCRIPT_BASE_PATH:-/opt/isyone/scripts}
      SCRIPT_TIMEOUT_SECONDS: ${SCRIPT_TIMEOUT_SECONDS:-120}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts:/opt/isyone/scripts
    ports:
      - "8000:8000"

volumes:
  postgres_data:
